name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel superseded runs on the same ref so pushing twice in a row doesn't waste runners.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck · lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        # Don't fail the build on lint warnings while we still have legacy noise.
        # Remove `continue-on-error` once the baseline is clean.
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
