name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # Cancel superseded runs on the same ref so pushing twice in a row doesn't waste runners.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck · lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        # Don't fail the build on lint warnings while we still have legacy noise.
        # Remove `continue-on-error` once the baseline is clean.
        run: npm run lint
        continue-on-error: true

      - name: Unit tests (frontend + pure backend libs)
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (typecheck · prisma generate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check (strict build config)
        # `tsconfig.build.json` mirrors what `nest build` compiles: production
        # code only, no seeds / tests / prisma scripts. 0 errors expected.
        run: npx tsc --noEmit -p tsconfig.build.json
